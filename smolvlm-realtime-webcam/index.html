<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camera Interaction App</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 20px;
            background-color: #f0f0f0;
        }
        .controls, .io-areas {
            display: flex;
            gap: 10px;
            align-items: center;
            background-color: #fff;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .io-areas {
            flex-direction: column;
            align-items: stretch;
        }
        textarea {
            width: 300px;
            height: 80px;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        #videoFeed {
            width: 480px;
            height: 360px;
            border: 2px solid #333;
            background-color: #000;
            border-radius: 8px;
        }
        #startButton {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            color: white;
        }
        #startButton.start {
            background-color: #28a745;
        }
        #startButton.stop {
            background-color: #dc3545;
        }
        label {
            font-weight: bold;
        }
        select {
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <h1>Camera Interaction App</h1>

    <video id="videoFeed" autoplay playsinline></video>
    <canvas id="canvas" class="hidden"></canvas>

    <div class="io-areas">
        <div>
            <label for="baseURL">SmolVLM Base API:</label><br>
            <input id="baseURL" value="http://localhost:8080">
        </div>
        <div>
            <select id="llmURL">
                <option value="http://localhost:8081">TinyLlama (8081)</option>
                <option value="http://localhost:8082">Phi-3 (8082)</option>
            </select>
        <div>
            <br>
            <label>Input Type: </label>
            <select id="instructionType" onchange="input()">
                <option selected></option>
                <option value="audio">Audio input</option>
                <option value="text">Text input</option>
            </select>
            <br>
        </div>
            
        </div>
        <div id="instructionForText" hidden>
            <label for="instructionText">Instruction:</label><br>
            <textarea id="instructionText" style="height: 2em; width: 40em"></textarea>
        </div>
        <div id = recordButton hidden>
            <label for="button">Record Audio: </label>
            <input type = "button" id = "but" value = "start" onCLick = button() style = "background-color: rgb(115, 255, 0);">
        </div>

        <div>
            <label for="smolvlmResponse">SmolVLM Response:</label><br>
            <textarea id="smolvlmResponse" style="height: 4em; width: 40em" readonly></textarea>
        </div>
        <div>
            <label for="tinyLlamaResponse">TinyLlama Response:</label><br>
            <textarea id="tinyLlamaResponse" style="height: 4em; width: 40em" readonly></textarea>
        </div>

        <div>
            <label for="phi3Response">Phi3 Response:</label><br>
            <textarea id="phi3Response" style="height: 4em; width: 40em" readonly></textarea>
        </div>

    </div>

    <div class="controls">
        <label for="intervalSelect">Interval:</label>
        <select id="intervalSelect">
            <option value="100">100ms</option>
            <option value="250">250ms</option>
            <option value="500" selected>500ms</option>
            <option value="1000">1s</option>
            <option value="2000">2s</option>
            <option value="single">Single Frame</option>
        </select>
        <button id="startButton" class="start">Start</button>
    </div>

    <script src="./src.js"></script>
</body>
</html>
